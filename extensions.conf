[general]
static=yes
writeprotect=no
clearglobalvars=no

[default]
exten => 7777,1,Answer()
 same => n,Wait(1)
 same => n,Playback(tapowan/g1)
 same => n(menu),Background(tapowan/g_menu)
 same => n,WaitExten(5)

; Menu Options
exten => 1,1,Playback(tapowan/g2)
 same => n,Goto(default,7777,menu)

exten => 2,1,Playback(tapowan/g3)
 same => n,Goto(default,7777,menu)

exten => 3,1,Playback(tapowan/g4)
 same => n,Goto(default,7777,menu)

exten => 4,1,Playback(tapowan/g5)
 same => n,Goto(default,7777,menu)

exten => 0,1,Playback(tapowan/g6)
 same => n,Dial(PJSIP/100,20)
 same => n,Hangup()

; AI Assistant Option
exten => 9,1,Playback(tapowan/g7)
 same => n(loop),Playback(beep)
 same => n,Set(RECFILE=/tmp/asterisk_ai/call_${EPOCH})
 same => n,Record(${RECFILE}.wav,3,15,q)
 same => n,Playback(tapowan/g8) ; "Thinking... please wait"
 same => n,System(curl -s -o ${RECFILE}_resp.wav -F audio=@${RECFILE}.wav -F callerId=${CALLERID(num)} http://127.0.0.1:4000/api/voice-process)
 same => n,Playback(${RECFILE}_resp)
 same => n,System(rm -f ${RECFILE}.wav ${RECFILE}_resp.wav)
 same => n,Goto(loop)

exten => i,1,Playback(invalid)
 same => n,Goto(default,7777,menu)

exten => t,1,Hangup()

exten => 100,1,Answer()
 same => n,Playback(hello-world)
 same => n,Hangup()
